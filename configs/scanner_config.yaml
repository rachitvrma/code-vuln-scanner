# scanner_config.yaml
# Tweak these without touching Python source code.

scanner:
  max_code_chunk_size: 2000   # chars per chunk sent to the LLM
  top_k_cve: 5                # CVEs retrieved per scan via RAG
  top_k_cwe: 3                # CWEs retrieved per scan via RAG
  confidence_threshold: 0.5   # [0–1] minimum to include in report
  skip_llm: false             # true → static + pattern only (no Ollama needed)

languages:
  supported:
    - python
    - c
    - cpp
    - java
    - javascript
    - php

# Vulnerability categories we track, with CWE mapping and affected languages.
vulnerabilities:
  - name: SQL Injection
    cwe_id: "CWE-89"
    severity: HIGH
    languages: [python, java, php, javascript, c, cpp]

  - name: Command Injection
    cwe_id: "CWE-78"
    severity: HIGH
    languages: [python, java, php, c, cpp]

  - name: Buffer Overflow
    cwe_id: "CWE-120"
    severity: CRITICAL
    languages: [c, cpp]

  - name: Stack-based Buffer Overflow
    cwe_id: "CWE-121"
    severity: CRITICAL
    languages: [c, cpp]

  - name: Path Traversal
    cwe_id: "CWE-22"
    severity: HIGH
    languages: [python, java, php, javascript]

  - name: Cross-Site Scripting
    cwe_id: "CWE-79"
    severity: HIGH
    languages: [php, javascript, python]

  - name: Insecure Deserialization
    cwe_id: "CWE-502"
    severity: HIGH
    languages: [python, java, php]

  - name: Hardcoded Credentials
    cwe_id: "CWE-798"
    severity: HIGH
    languages: [python, java, javascript, php, c, cpp]

  - name: Integer Overflow
    cwe_id: "CWE-190"
    severity: MEDIUM
    languages: [c, cpp, java]

  - name: Race Condition
    cwe_id: "CWE-362"
    severity: MEDIUM
    languages: [python, java, c, cpp]

  - name: Use After Free
    cwe_id: "CWE-416"
    severity: CRITICAL
    languages: [c, cpp]

  - name: XML External Entity Injection
    cwe_id: "CWE-611"
    severity: HIGH
    languages: [python, java, php]

  - name: Open Redirect
    cwe_id: "CWE-601"
    severity: MEDIUM
    languages: [python, java, php, javascript]

rag:
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size: 512
  chunk_overlap: 64

# NVD keyword searches run during setup_db.py
nvd_seed_keywords:
  - "SQL injection"
  - "buffer overflow"
  - "command injection"
  - "path traversal"
  - "cross-site scripting"
  - "insecure deserialization"
  - "race condition"
  - "use after free"
  - "integer overflow"
  - "hardcoded password"
  - "XML external entity"
  - "open redirect"

# CWE IDs to fetch from MITRE during setup
cwe_seed_ids:
  - "CWE-89"
  - "CWE-79"
  - "CWE-78"
  - "CWE-120"
  - "CWE-121"
  - "CWE-122"
  - "CWE-22"
  - "CWE-502"
  - "CWE-798"
  - "CWE-190"
  - "CWE-362"
  - "CWE-416"
  - "CWE-611"
  - "CWE-601"
  - "CWE-476"
  - "CWE-287"
  - "CWE-306"
  - "CWE-434"
  - "CWE-732"
  - "CWE-918"
